<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Memory NSI</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

.memory{
display:grid;
grid-template-columns:repeat(auto-fit,120px);
gap:15px;
justify-content:center;
margin-top:40px;
}

.card{
width:120px;
height:120px;
perspective:1000px;
cursor:pointer;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:0.6s;
}

.card.flipped .inner{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:10px;
backface-visibility:hidden;
}

.front{
background:#00ffe0;
}

.back{
transform:rotateY(180deg);
}

.back img{
width:100%;
height:100%;
object-fit:cover;
border-radius:10px;
}

button{
margin:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#00ffe0;
font-weight:bold;
cursor:pointer;
}

input,select{
padding:8px;
margin:5px;
border-radius:6px;
border:none;
}

#gameInfo{
font-size:20px;
margin-top:10px;
}

#endScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:30px;
z-index:10;
}

#endScreen button{
font-size:20px;
}

/* MESSAGE MEME */

#memeMessage{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
font-weight:bold;
color:#00ffe0;
text-shadow:0 0 20px black;
display:none;
z-index:20;
}

</style>
</head>

<body>

<h1>Memory NSI</h1>

<div id="setup">

<p>Nombre de joueurs</p>

<select id="playerCount">
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<p>Difficulté</p>

<select id="difficulty">
<option value="easy">Facile</option>
<option value="medium">Moyen</option>
<option value="hard">Difficile</option>
</select>

<div id="nameInputs"></div>

<button onclick="startGame()">Commencer</button>

</div>

<div id="gameInfo">
⏱ Temps : <span id="timer">0</span> |
🎯 Coups : <span id="moves">0</span>
</div>

<div id="scoreboard"></div>

<div class="memory" id="memory"></div>

<button onclick="restartGame()">Recommencer</button>

<div id="memeMessage"></div>

<div id="endScreen">
<div id="endMessage"></div>
<button onclick="restartGame()">Rejouer</button>
</div>

<script>

const allImages=[
"quentin.jpg","mathis.jpg","dimitri.jpg","alari.jpg","antoine.jpg",
"akoan.jpg","cesar.jpg","ethan.jpg","kirk.png","marty.jpg",
"jules.jpg","adrien.jpg","pal.png","aurel.jpg","nathan.jpg",
"flight.png","nathan2.jpg","alari2.jpg","marty2.jpg","simon.jpg",
"simon2.jpg","elio.jpg","ethan2.jpg","moi.jpg"
];

/* SONS */

const sounds=[
"SONS/son1.mp3",
"SONS/son2.mp3",
"SONS/son3.mp3",
"SONS/son4.mp3",
"SONS/son5.mp3",
"SONS/son6.mp3",
"SONS/son7.mp3",
"SONS/son8.mp3",
"SONS/son9.mp3",
"SONS/son10.mp3",
"SONS/son11.mp3"
];

function playRandomSound(){
const random=Math.floor(Math.random()*sounds.length);
const audio=new Audio(sounds[random]);
audio.play();
}

/* MESSAGES MEMES */

const successMessages=[
"🔥 MASTERCLASS",
"🧠 200 IQ PLAY",
"💪 Top 5 respect moment",
"📈 PRO GAMER",
"❤️‍🩹​ So tuff ",
"👑 Marty ",
"⚡ SPEEDRUN"
];

const failMessages=[
"💀 Ts is not tuff ",
"🤡 QUEL NIVEAU",
"🧠 UTILISE TON CERVEAU",
"📉 QI EN BAISSE",
"👀 -1000 aura ",
"😭 Mathis qui rideee",
"💤 REVEILLE TOI"
];

function showMeme(text){

const box=document.getElementById("memeMessage");

box.textContent=text;
box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},2000);

}

function randomMessage(list){
return list[Math.floor(Math.random()*list.length)];
}

let images=[];
let players=[];
let scores=[];
let currentPlayer=0;

let firstCard=null;
let secondCard=null;
let lock=false;
let matches=0;

let moves=0;

let timer;
let timeLeft=0;

let gameOver=false;

const playerCount=document.getElementById("playerCount");
const nameInputs=document.getElementById("nameInputs");

function createInputs(){

nameInputs.innerHTML="";

for(let i=1;i<=playerCount.value;i++){

nameInputs.innerHTML+=`
<p>Joueur ${i} :
<input id="player${i}" placeholder="Pseudo">
</p>
`;

}

}

playerCount.addEventListener("change",createInputs);
createInputs();

function startGame(){

gameOver=false;

document.getElementById("endScreen").style.display="none";

const memory=document.getElementById("memory");
memory.innerHTML="";

clearInterval(timer);

firstCard=null;
secondCard=null;
lock=false;
matches=0;
moves=0;

document.getElementById("moves").textContent=moves;

const difficulty=document.getElementById("difficulty").value;

if(difficulty==="easy") images=allImages.slice(0,10);
if(difficulty==="medium") images=allImages.slice(0,17);
if(difficulty==="hard") images=allImages.slice(0,24);

players=[];
scores=[];

for(let i=1;i<=playerCount.value;i++){

let name=document.getElementById("player"+i).value;

if(name==="") name="Joueur "+i;

players.push(name);
scores.push(0);

}

currentPlayer=0;

updateScoreboard();

setupTimer();

let cards=[...images,...images];

cards.sort(()=>Math.random()-0.5);

cards.forEach(src=>{

const card=document.createElement("div");
card.classList.add("card");

card.innerHTML=`
<div class="inner">
<div class="front"></div>
<div class="back">
<img src="MEMORY/${src}">
</div>
</div>
`;

card.addEventListener("click",()=>clickCard(card));

memory.appendChild(card);

});

}

function setupTimer(){

const difficulty=document.getElementById("difficulty").value;
const p=playerCount.value;

let baseTime=70;

if(difficulty==="medium") baseTime=160;
if(difficulty==="hard") baseTime=290;

timeLeft=baseTime+(p*20);

document.getElementById("timer").textContent=timeLeft;

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").textContent=timeLeft;

if(timeLeft<=0){

clearInterval(timer);
gameOver=true;

showEndScreen("⏰ Temps écoulé ! Partie perdue");

}

},1000);

}

function clickCard(card){

if(gameOver||lock||card.classList.contains("flipped")) return;

card.classList.add("flipped");

if(!firstCard){
firstCard=card;
return;
}

secondCard=card;
lock=true;

moves++;
document.getElementById("moves").textContent=moves;

let img1=firstCard.querySelector("img").src;
let img2=secondCard.querySelector("img").src;

if(img1===img2){

playRandomSound();

showMeme(randomMessage(successMessages));

scores[currentPlayer]++;
matches++;

updateScoreboard();

firstCard=null;
secondCard=null;
lock=false;

if(matches===images.length){

clearInterval(timer);
showWinner();

}

}else{

showMeme(randomMessage(failMessages));

setTimeout(()=>{

firstCard.classList.remove("flipped");
secondCard.classList.remove("flipped");

firstCard=null;
secondCard=null;
lock=false;

if(players.length>1){

currentPlayer++;

if(currentPlayer>=players.length) currentPlayer=0;

updateScoreboard();

}

},1000);

}

}

function updateScoreboard(){

let html=`<p>Tour : <span>${players[currentPlayer]}</span></p>`;

players.forEach((p,i)=>{

html+=`<p>${p} : ${scores[i]}</p>`;

});

document.getElementById("scoreboard").innerHTML=html;

}

function showWinner(){

gameOver=true;

let max=Math.max(...scores);
let winners=[];

scores.forEach((s,i)=>{

if(s===max) winners.push(players[i]);

});

showEndScreen("🏆 Gagnant : "+winners.join(", "));

}

function showEndScreen(text){

document.getElementById("endMessage").textContent=text;
document.getElementById("endScreen").style.display="flex";

}

function restartGame(){
startGame();
}

</script>

</body>
</html>
